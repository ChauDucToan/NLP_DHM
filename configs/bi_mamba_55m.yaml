# Bi-Mamba — Chinese↔Vietnamese translation.
#
# Default budget (~110M with vocab=32k, d_model=640, layers 6/6, d_ff=1792):
#   embedding (shared, tied with lm_head) : 32,000 × 640   ≈ 20.5M
#   encoder (6 × bi-mamba + ffn @ d_model=640)             ≈ ~35M
#   decoder (6 × mamba + cross-attn + ffn)                 ≈ ~55M
#   total                                                  ≈ 110M
#
# Older 55M / 63M checkpoints (d_model=512, layers 5/5) still load — the
# trainer stores ``model_cfg`` inside the checkpoint payload, so
# ``evaluate.py`` / ``translate.py`` rebuild the right architecture.

model:
  vocab_size: 32000          # shared SentencePiece BPE for zh + vi + special tokens
  d_model: 640               # was 512 (55M) -> bumped for path A
  d_state: 16                # SSM state size
  d_conv: 4                  # local conv kernel inside Mamba
  expand: 2                  # inner expansion factor
  n_encoder_layers: 6        # was 5
  n_decoder_layers: 6        # was 5
  d_ff: 1792                 # FFN inner ≈ 2.8 * d_model -> ~95M total
  n_cross_attn_heads: 10     # head_dim = 64 (640 / 10)
  dropout: 0.1
  tie_embeddings: true       # tie input embedding with lm_head
  max_src_len: 256
  max_tgt_len: 256
  pad_id: 0
  bos_id: 1
  eos_id: 2
  unk_id: 3
  # Direction tag tokens (prepended to the source so one model can do both directions).
  zh2vi_id: 4                # <2vi>
  vi2zh_id: 5                # <2zh>

tokenizer:
  type: sentencepiece
  model_type: bpe
  vocab_size: 32000
  character_coverage: 0.9995
  # Reserve first 6 ids for: <pad> <bos> <eos> <unk> <2vi> <2zh>
  user_defined_symbols: ["<2vi>", "<2zh>"]
  # Note: <pad>, <bos>, <eos>, <unk> are passed via SP control flags.

data:
  # Data source — direct download from OPUS (no HuggingFace dataset needed).
  # Pick a preset via `prepare_data.py --preset {tiny|small|medium|large}` or
  # override with `--sources ted2020 wikimatrix opensubtitles ...`.
  #
  # NOTE on preset choice: empirically `small` (TED2020 + WikiMatrix +
  # bible-uedin, ~225k clean pairs) gives the *highest* test BLEU on the
  # default test split. `medium` adds OpenSubtitles vi-zh_cn which is huge
  # but extremely noisy and conversational, and the test split inherits
  # that noise → BLEU collapses to ~1–2. If you do want OpenSubtitles, use
  # ``max_pairs_per_source.opensubtitles`` to cap it (e.g. 100k) so it can
  # add some conversational variety without drowning out the clean data.
  preset: "small"             # tiny / small / medium / large
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  tokenizer_dir: "data/tokenizer"
  # Subsample for fast Colab runs. Set null for full corpus.
  max_train_pairs: 400000
  max_valid_pairs: 2000
  max_test_pairs: 2000
  min_len: 1
  max_len: 250                # in tokens (after SP); pairs longer than this are filtered
  bidirectional: true         # add both zh→vi and vi→zh examples (doubles training set)
  seed: 42
  # Strict per-language script filter (zh must be majority CJK; vi must be Latin).
  # This kicks out the worst noise from WikiMatrix.
  script_check: true
  # zh-vi character-length ratio bounds. Empirically clean OPUS pairs sit at
  # len(zh)/len(vi) ≈ 0.20–0.60 (vi has spaces + diacritics so it's longer).
  min_zh_vi_ratio: 0.10
  max_zh_vi_ratio: 1.20
  # Per-source caps (only takes effect when the source is in the preset).
  # Set the noisy/large sources to a sane upper bound so they cannot dominate.
  max_pairs_per_source:
    opensubtitles: 100000     # cap conversational subtitles to 100k
    wikimatrix:    100000     # cap WikiMatrix to 100k (top-LASER pairs)
    nllb:          200000     # cap NLLB pseudo-aligned data
    # ted2020 / bible_uedin left uncapped — they're small + clean

train:
  output_dir: "runs/bi_mamba_55m"
  batch_size: 128
  grad_accum_steps: 1
  max_steps: 120000          # ~ 35 epochs over ~450k bi-direction pairs at bs=128
  warmup_steps: 4000
  lr: 5.0e-4
  min_lr: 1.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.98]
  eps: 1.0e-9
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 50
  eval_every: 2000
  save_every: 2000
  amp_dtype: "bf16"          # one of: "fp32", "fp16", "bf16"
  num_workers: 4             # bump on machines with >4 cores; Colab has 8
  pin_memory: true
  seed: 42
  # Length-bucketed batching: within each pool of pool_factor*batch_size items,
  # sort by length and chop into batches; cuts padding waste 30–50%.
  length_bucket: true
  bucket_pool_factor: 100
  # Exponential moving average of weights (used for EMA val-loss + eval).
  ema: true
  ema_decay: 0.9990
  # Early stopping. Patience is in number of eval ticks (each eval_every steps).
  # 10 ticks * eval_every=2000 = 20K steps without improvement -> stop.
  # Set to 0 to disable.
  early_stopping_patience: 15  # 15 ticks * eval_every=2000 = 30k stale steps -> stop
  early_stopping_min_delta: 0.0
  # ===================================================================
  # Path A regularizers — turn on for the bigger model so it doesn't
  # overfit on ~225k clean pairs.
  # ===================================================================
  # R-Drop: forward each batch twice with different dropout, add
  # symmetric KL between the two output distributions. Costs ~1.7×
  # wall-clock and 2× VRAM per step; gives +0.5–1.5 BLEU on low-resource MT.
  # Set to 0.0 to disable (e.g. on T4 if you OOM).
  r_drop_alpha: 1.0
  # BPE-dropout (subword regularization). Each train sample is re-tokenized
  # with a random segmentation drawn at α temperature. Eval / inference
  # always uses the deterministic 1-best segmentation. Typical α: 0.05–0.1.
  # Set to 0.0 to disable.
  bpe_dropout: 0.1

eval:
  beam_size: 6
  # Per-direction length penalty. Vietnamese targets are ~3× longer in
  # characters than Chinese targets, so a slightly higher LP for zh→vi keeps
  # outputs from being too short, and a lower LP for vi→zh keeps zh outputs
  # from being padded. Tune in [0.6, 1.4] on dev set.
  length_penalty:
    zh2vi: 1.20
    vi2zh: 0.80
  max_decode_len: 256
  num_samples: 1000          # how many test pairs to score per direction
