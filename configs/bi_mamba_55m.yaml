# Bi-Mamba — Chinese↔Vietnamese translation.
#
# Default budget (~63M with vocab=32k):
#   embedding (shared, tied with lm_head) : 32,000 × 512   ≈ 16.4M
#   encoder (5 × bi-mamba + ffn @ d_model=512)             ≈ 23.0M
#   decoder (5 × mamba + cross-attn + ffn)                 ≈ 23.4M
#   final norms + biases                                   ≈   0M
#   total                                                  ≈ 62.8M
# (To stay at ~55M, keep vocab_size=16000.)

model:
  vocab_size: 32000          # shared SentencePiece BPE for zh + vi + special tokens
  d_model: 512
  d_state: 16                # SSM state size
  d_conv: 4                  # local conv kernel inside Mamba
  expand: 2                  # inner expansion factor
  n_encoder_layers: 5
  n_decoder_layers: 5
  d_ff: 1280                 # FFN inner = 2.5 * d_model (keeps total ≈ 55M params)
  n_cross_attn_heads: 8
  dropout: 0.1
  tie_embeddings: true       # tie input embedding with lm_head
  max_src_len: 256
  max_tgt_len: 256
  pad_id: 0
  bos_id: 1
  eos_id: 2
  unk_id: 3
  # Direction tag tokens (prepended to the source so one model can do both directions).
  zh2vi_id: 4                # <2vi>
  vi2zh_id: 5                # <2zh>

tokenizer:
  type: sentencepiece
  model_type: bpe
  vocab_size: 32000
  character_coverage: 0.9995
  # Reserve first 6 ids for: <pad> <bos> <eos> <unk> <2vi> <2zh>
  user_defined_symbols: ["<2vi>", "<2zh>"]
  # Note: <pad>, <bos>, <eos>, <unk> are passed via SP control flags.

data:
  # Data source — direct download from OPUS (no HuggingFace dataset needed).
  # Pick a preset via `prepare_data.py --preset {tiny|small|medium|large}` or
  # override with `--sources ted2020 wikimatrix opensubtitles ...`.
  #
  # NOTE on preset choice:
  # `everyday` (default) — TED2020 + WikiMatrix + OpenSubtitles (capped 80k) +
  #   bible-uedin (capped 8k). Bible is only ~3% of the mix so the model is
  #   not biased toward biblical register; OpenSubtitles supplies
  #   conversational vocabulary so phrases like "hello world" translate
  #   naturally instead of as literary/scriptural variants.
  # `small` — original TED2020 + WikiMatrix + bible-uedin (no per-source caps
  #   used to be applied → bible was ~14% of clean data → biased translation).
  # `medium` — small + uncapped OpenSubtitles. Without caps OpenSubtitles
  #   dominates 88% of the pool and BLEU collapses on the test split. Use
  #   `max_pairs_per_source.opensubtitles` to cap it.
  preset: "everyday"          # tiny / small / everyday / medium / large
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  tokenizer_dir: "data/tokenizer"
  # Subsample for fast Colab runs. Set null for full corpus.
  max_train_pairs: 400000
  max_valid_pairs: 2000
  max_test_pairs: 2000
  min_len: 1
  max_len: 250                # in tokens (after SP); pairs longer than this are filtered
  bidirectional: true         # add both zh→vi and vi→zh examples (doubles training set)
  seed: 42
  # Strict per-language script filter (zh must be majority CJK; vi must be Latin).
  # This kicks out the worst noise from WikiMatrix.
  script_check: true
  # Normalise zh to Simplified Mandarin via OpenCC (Trad→Simp). The OPUS zh-vi
  # corpora are heterogeneous: TED2020 is Cantonese in Traditional script,
  # bible-uedin is Traditional, WikiMatrix is mixed Trad/Simp/Classical, only
  # OpenSubtitles vi-zh_cn is Simplified. Without this step the model learns
  # an inconsistent style and translates everyday phrases in the wrong register.
  zh_normalize_simplified: true
  # Drop pairs whose zh side contains Cantonese-only particles (嘅/哋/啲/咁/喺/嗰/咗).
  # ~70% of TED2020.vi-zh.zh is actually Cantonese (粵語) mis-labelled as zh —
  # without this filter the model is partly trained on Cantonese, not Mandarin.
  zh_filter_cantonese: true
  # zh-vi character-length ratio bounds. Empirically clean OPUS pairs sit at
  # len(zh)/len(vi) ≈ 0.20–0.60 (vi has spaces + diacritics so it's longer).
  min_zh_vi_ratio: 0.10
  max_zh_vi_ratio: 1.20
  # Per-source caps (only takes effect when the source is in the preset).
  # Set the noisy/large sources to a sane upper bound so they cannot dominate.
  # Defaults are tuned for the `everyday` preset (~225k clean pairs total
  # *after* Cantonese filter + Trad→Simp normalisation):
  #   TED2020 ~4k  (uncapped — most of TED2020.zh is Cantonese, dropped)
  #   WikiMatrix ~85k (cap 100k)
  #   OpenSubtitles ~80k (cap 80k, conversational)
  #   NLLB ~50k (cap 50k, web-mined news/tourism/narrative)
  #   bible-uedin ~6k (cap 6k → ~2.7% of mix).
  max_pairs_per_source:
    opensubtitles: 80000      # cap conversational subtitles to 80k (~36% of mix)
    wikimatrix:    100000     # cap WikiMatrix to 100k (top-LASER pairs, ~38%)
    nllb:          50000      # cap NLLB web-mined to 50k (~22%, broad domains)
    bible_uedin:   6000       # cap bible-uedin to 6k → ~3% of mix (was ~14%)
    # ted2020 left uncapped — most of it is Cantonese and gets filtered out

train:
  output_dir: "runs/bi_mamba_55m"
  batch_size: 128
  grad_accum_steps: 1
  max_steps: 120000          # ~ 35 epochs over ~450k bi-direction pairs at bs=128
  warmup_steps: 4000
  lr: 5.0e-4
  min_lr: 1.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.98]
  eps: 1.0e-9
  grad_clip: 1.0
  label_smoothing: 0.1
  log_every: 50
  eval_every: 2000
  save_every: 2000
  amp_dtype: "bf16"          # one of: "fp32", "fp16", "bf16"
  num_workers: 4             # bump on machines with >4 cores; Colab has 8
  pin_memory: true
  seed: 42
  # Length-bucketed batching: within each pool of pool_factor*batch_size items,
  # sort by length and chop into batches; cuts padding waste 30–50%.
  length_bucket: true
  bucket_pool_factor: 100
  # Exponential moving average of weights (used for EMA val-loss + eval).
  ema: true
  ema_decay: 0.9990
  # Early stopping. Patience is in number of eval ticks (each eval_every steps).
  # 10 ticks * eval_every=2000 = 20K steps without improvement -> stop.
  # Set to 0 to disable.
  early_stopping_patience: 15  # 15 ticks * eval_every=2000 = 30k stale steps -> stop
  early_stopping_min_delta: 0.0

eval:
  beam_size: 6
  # Per-direction length penalty. Vietnamese targets are ~3× longer in
  # characters than Chinese targets, so a slightly higher LP for zh→vi keeps
  # outputs from being too short, and a lower LP for vi→zh keeps zh outputs
  # from being padded. Tune in [0.6, 1.4] on dev set.
  length_penalty:
    zh2vi: 1.20
    vi2zh: 0.80
  max_decode_len: 256
  num_samples: 1000          # how many test pairs to score per direction
