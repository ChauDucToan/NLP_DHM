# Bi-Mamba — Chinese↔Vietnamese translation.
#
# Default budget (**v3, 32.4M params** with vocab=16k, d_model=384):
#   embedding (shared, tied with lm_head) : 16,000 × 384   ≈  6.1M
#   encoder (5 × bi-mamba + ffn @ d_model=384)             ≈ 14.8M
#   decoder (5 × mamba + cross-attn + ffn)                 ≈ 11.5M
#   final norms + biases                                   ≈   0M
#   total                                                  ≈ 32.4M
# Sized for the `everyday` v3 dataset (~135k clean pairs): smaller model
# with smaller vocab + d_model 384 gives ~4.2k pairs / param (vs 1.7k
# pairs / param at the previous 62.8M budget which overfit to noise).
# (Earlier budgets: ~63M with vocab=32k+d_model=512; ~55M with vocab=16k+d_model=512.)

model:
  vocab_size: 16000          # shared SentencePiece BPE for zh + vi + special tokens (v3: 32k -> 16k)
  d_model: 384               # v3: 512 -> 384, quadratic param savings
  d_state: 16                # SSM state size
  d_conv: 4                  # local conv kernel inside Mamba
  expand: 2                  # inner expansion factor
  n_encoder_layers: 5
  n_decoder_layers: 5
  d_ff: 960                  # FFN inner = 2.5 * d_model (kept at 2.5× ratio)
  n_cross_attn_heads: 8      # 384 / 8 = 48 dim per head
  dropout: 0.1
  tie_embeddings: true       # tie input embedding with lm_head
  max_src_len: 256
  max_tgt_len: 256
  pad_id: 0
  bos_id: 1
  eos_id: 2
  unk_id: 3
  # Direction tag tokens (prepended to the source so one model can do both directions).
  zh2vi_id: 4                # <2vi>
  vi2zh_id: 5                # <2zh>

tokenizer:
  type: sentencepiece
  model_type: bpe
  vocab_size: 16000          # v3: matches model.vocab_size
  # v3: 0.9995 -> 1.0 to cover all observed CJK characters. With 0.9995 the
  # SP trainer dropped the rarest 0.05% of characters which produced ⟨unk⟩
  # tokens in vi→zh outputs (e.g. "你好世界" → " ⁇好世界"). character_coverage=1.0
  # ensures every distinct character in the training corpus is in the vocab.
  character_coverage: 1.0
  # Reserve first 6 ids for: <pad> <bos> <eos> <unk> <2vi> <2zh>
  user_defined_symbols: ["<2vi>", "<2zh>"]
  # Note: <pad>, <bos>, <eos>, <unk> are passed via SP control flags.

data:
  # Data source — direct download from OPUS (no HuggingFace dataset needed).
  # Pick a preset via `prepare_data.py --preset {tiny|small|everyday|medium|large}`
  # or override with `--sources ted2020 wikimatrix opensubtitles ...`.
  #
  # NOTE on preset choice:
  # `everyday` (default, **revised v3**) — TED2020 + WikiMatrix +
  #   OpenSubtitles (capped 20k) + **NLLB confidence-filtered**
  #   (LASER >= 1.10, capped 20k) + bible-uedin (capped 6k). Bible only ~4%
  #   of mix; OpenSubtitles is conversational vocab; NLLB now uses the
  #   `min_score_per_source.nllb` filter to keep ONLY high-confidence pairs
  #   from the LASER score sidecar. **History:** v1 used random-sampled
  #   NLLB cap 50k + OpenSubtitles cap 80k → BLEU 5.96 zh→vi (vs 47.89
  #   baseline) due to alignment noise. v2 dropped NLLB entirely → BLEU
  #   stayed low because data shrank too far. v3 keeps NLLB but only the
  #   high-confidence head (~10% of NLLB pool).
  # `small` — original TED2020 + WikiMatrix + bible-uedin (no per-source caps
  #   used to be applied → bible was ~14% of clean data → biased translation).
  # `medium` — small + uncapped OpenSubtitles. Without caps OpenSubtitles
  #   dominates 88% of the pool and BLEU collapses on the test split. Use
  #   `max_pairs_per_source.opensubtitles` to cap it.
  preset: "everyday"          # tiny / small / everyday / medium / large
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  tokenizer_dir: "data/tokenizer"
  # Subsample for fast Colab runs. Set null for full corpus.
  max_train_pairs: 400000
  max_valid_pairs: 5000      # bumped from 2000 — smoother val_loss curve, more reliable BLEU
  max_test_pairs: 5000
  min_len: 1
  max_len: 250                # in tokens (after SP); pairs longer than this are filtered
  bidirectional: true         # add both zh→vi and vi→zh examples (doubles training set)
  seed: 42
  # Strict per-language script filter (zh must be majority CJK; vi must be Latin).
  # This kicks out the worst noise from WikiMatrix.
  script_check: true
  # Normalise zh to Simplified Mandarin via OpenCC (Trad→Simp). The OPUS zh-vi
  # corpora are heterogeneous: TED2020 is Cantonese in Traditional script,
  # bible-uedin is Traditional, WikiMatrix is mixed Trad/Simp/Classical, only
  # OpenSubtitles vi-zh_cn is Simplified. Without this step the model learns
  # an inconsistent style and translates everyday phrases in the wrong register.
  zh_normalize_simplified: true
  # Drop pairs whose zh side contains Cantonese-only particles (嘅/哋/啲/咁/喺/嗰/咗).
  # ~70% of TED2020.vi-zh.zh is actually Cantonese (粵語) mis-labelled as zh —
  # without this filter the model is partly trained on Cantonese, not Mandarin.
  zh_filter_cantonese: true
  # zh-vi character-length ratio bounds. Empirically clean OPUS pairs sit at
  # len(zh)/len(vi) ≈ 0.20–0.60 (vi has spaces + diacritics so it's longer).
  min_zh_vi_ratio: 0.10
  max_zh_vi_ratio: 1.20
  # Per-source caps (only takes effect when the source is in the preset).
  # Set the noisy/large sources to a sane upper bound so they cannot dominate.
  # Defaults are tuned for the `everyday` v3 preset (~135k clean pairs total
  # *after* Cantonese filter + Trad→Simp normalisation + NLLB score filter):
  #   TED2020 ~3k     (uncapped — most of TED2020.zh is Cantonese, dropped)
  #   WikiMatrix ~85k (cap 100k, ~63%)
  #   OpenSubtitles ~20k (cap 20k, small dose for conversational vocab, ~15%)
  #   NLLB ~20k (cap 20k from LASER >= 1.10 head, ~15%)
  #   bible-uedin ~6k (cap 6k → ~4% of mix).
  max_pairs_per_source:
    opensubtitles: 20000      # cap conversational subtitles — small dose only (~15%)
    wikimatrix:    100000     # cap WikiMatrix to 100k (top-LASER pairs, ~63%)
    nllb:          20000      # cap NLLB at 20k AFTER score filter (~15% of mix)
    bible_uedin:   6000       # cap bible-uedin to 6k → ~4% of mix (was ~14%)
    # ted2020 left uncapped — most of it is Cantonese and gets filtered out
  # Per-source minimum alignment score. Only applied when the source provides
  # a score sidecar in its OPUS zip. Currently NLLB ships LASER-style cosine
  # similarities sorted DESC; ~1.10 keeps the top ~10% by quality, ~1.20
  # keeps the top ~1–2%. Lowering this admits more (noisier) data; raising it
  # gets cleaner pairs at the cost of corpus size.
  min_score_per_source:
    nllb: 1.10

train:
  output_dir: "runs/bi_mamba_55m"
  batch_size: 128
  grad_accum_steps: 1
  max_steps: 60000           # shorter schedule for the everyday corpus after fast-path fix
  warmup_steps: 3000
  lr: 3.0e-4
  min_lr: 1.0e-5
  weight_decay: 0.05
  betas: [0.9, 0.98]
  eps: 1.0e-9
  grad_clip: 1.0
  label_smoothing: 0.08
  log_every: 50
  eval_every: 1000
  save_every: 1000
  amp_dtype: "bf16"          # one of: "fp32", "fp16", "bf16"
  num_workers: 4             # bump on machines with >4 cores; Colab has 8
  pin_memory: true
  seed: 42
  # Length-bucketed batching: within each pool of pool_factor*batch_size items,
  # sort by length and chop into batches; cuts padding waste 30–50%.
  length_bucket: true
  bucket_pool_factor: 100
  # Exponential moving average of weights (used for EMA val-loss + eval).
  ema: true
  ema_decay: 0.9990
  # Early stopping. Patience is in number of eval ticks (each eval_every steps).
  # 6 ticks * eval_every=1000 = 6K steps without improvement -> stop.
  # Set to 0 to disable.
  early_stopping_patience: 6   # 6 ticks * eval_every=1000 = 6k stale steps -> stop
  early_stopping_min_delta: 0.0

eval:
  beam_size: 4
  # Per-direction length penalty. Vietnamese targets are ~3× longer in
  # characters than Chinese targets, so a slightly higher LP for zh→vi keeps
  # outputs from being too short, and a lower LP for vi→zh keeps zh outputs
  # from being padded. Tune in [0.6, 1.4] on dev set.
  length_penalty:
    zh2vi: 1.00
    vi2zh: 0.90
  max_decode_len: 256
  num_samples: 3000          # bumped from 1000 — stable BLEU/chrF (±0.5 noise)
